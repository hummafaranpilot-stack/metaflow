<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MetaFlow - Trusted Nutra Products</title>
<link rel="icon" type="image/png" href="favicon.png">
<script>
(function(){
  var ua = navigator.userAgent;
  var mobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(ua)
               || (window.innerWidth > 0 && window.innerWidth <= 768);
  var params = window.location.search + window.location.hash;
  window.location.replace((mobile ? 'mobile.html' : 'desktop.html') + params);
})();
</script>
</head>
<body></body>
</html>
